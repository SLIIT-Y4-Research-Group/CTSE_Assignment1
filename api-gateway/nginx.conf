events {}

http {
    map $http_origin $cors_origin {
        default "";
        "http://localhost:5173" $http_origin;
    }

    upstream user_service {
        server 127.0.0.1:3001;
    }

    upstream event_service {
        server 127.0.0.1:3002;
    }

    upstream ticket_service {
        server 127.0.0.1:3003;
    }

    upstream payment_service {
        server 127.0.0.1:3004;
    }

    upstream notification_service {
        server 127.0.0.1:3005;
    }

    server {
        listen 80;
        server_name localhost;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        location = / {
            return 200 "API Gateway is running\n";
            add_header Content-Type text/plain;
        }

        location = /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location /api/users/ {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://user_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/events/ {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://event_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/tickets/ {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://ticket_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/payments/ {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://payment_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications/ {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://notification_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/docs/users/ {
            proxy_pass http://user_service/api/docs/;
        }

        location /api/docs/events/ {
            proxy_pass http://event_service/api/docs/;
        }

        location /api/docs/tickets/ {
            proxy_pass http://ticket_service/api/docs/;
        }

        location /api/docs/payments/ {
            proxy_pass http://payment_service/api/docs/;
        }

        location /api/docs/notifications/ {
            proxy_pass http://notification_service/api/docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /api/health/user {
            proxy_pass http://user_service/health;
        }

        location = /api/health/event {
            proxy_pass http://event_service/health;
        }

        location = /api/health/ticket {
            proxy_pass http://ticket_service/health;
        }

        location = /api/health/payment {
            proxy_pass http://payment_service/health;
        }

        location = /api/health/notification {
            proxy_pass http://notification_service/health;
        }

        location = /api/db-check/user {
            proxy_pass http://user_service/db-check;
        }

        location = /api/db-check/event {
            proxy_pass http://event_service/db-check;
        }

        location = /api/db-check/ticket {
            proxy_pass http://ticket_service/db-check;
        }

        location = /api/db-check/payment {
            proxy_pass http://payment_service/db-check;
        }

        location = /api/db-check/notification {
            proxy_pass http://notification_service/db-check;
        }
    }
}
