events {}

http {
    upstream user_service {
        server user-service:3000;
    }

    upstream notification_service {
        server notification-service:3000;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/users/ {
            proxy_pass http://user_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications/ {
            proxy_pass http://notification_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /api/health/user {
            proxy_pass http://user_service/health;
        }

        location = /api/health/notification {
            proxy_pass http://notification_service/health;
        }

        location = /api/db-check/user {
            proxy_pass http://user_service/db-check;
        }

        location = /api/db-check/notification {
            proxy_pass http://notification_service/db-check;
        }
    }
}
